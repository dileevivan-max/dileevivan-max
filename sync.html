<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Синхронизация заявок — Resanta СЦ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  body { font-family: -apple-system, Segoe UI, Arial, sans-serif; max-width: 560px; margin: 60px auto; padding: 0 20px; color: #1a1a1a; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  p.sub { color: #666; margin-top: 0; margin-bottom: 28px; }
  .field { margin-bottom: 18px; }
  label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; }
  input[type="password"], input[type="file"] {
    width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; box-sizing: border-box;
  }
  button {
    background: #16a34a; color: white; border: none; padding: 12px 20px; border-radius: 8px;
    font-size: 15px; font-weight: 600; cursor: pointer; width: 100%;
  }
  button:disabled { background: #999; cursor: not-allowed; }
  #status { margin-top: 20px; padding: 14px; border-radius: 8px; font-size: 14px; display: none; white-space: pre-wrap; }
  #status.ok { background: #dcfce7; color: #166534; display: block; }
  #status.err { background: #fee2e2; color: #991b1b; display: block; }
  #status.loading { background: #f1f5f9; color: #334155; display: block; }
</style>
</head>
<body>

<h1>Синхронизация заявок</h1>
<p class="sub">Загрузите актуальный Excel-файл (формат как «Оборудование_СЦ_Все_этапы»). Данные обновятся в базе для Telegram-бота.</p>

<div class="field">
  <label for="syncKey">Ключ синхронизации</label>
  <input type="password" id="syncKey" placeholder="Введите ключ синхронизации">
</div>

<div class="field">
  <label for="fileInput">Excel-файл</label>
  <input type="file" id="fileInput" accept=".xlsx,.xls">
</div>

<button id="uploadBtn">Загрузить и обновить базу</button>

<div id="status"></div>

<script>
// Замените на адрес вашей функции sync-orders, например:
// https://abmiwgehyldazdjpvvlu.supabase.co/functions/v1/sync-orders
const FUNCTION_URL = "https://abmiwgehyldazdjpvvlu.supabase.co/functions/v1/sync-orders";

const statusEl = document.getElementById("status");
const btn = document.getElementById("uploadBtn");

function showStatus(text, type) {
  statusEl.textContent = text;
  statusEl.className = type;
}

btn.addEventListener("click", async () => {
  const key = document.getElementById("syncKey").value.trim();
  const file = document.getElementById("fileInput").files[0];

  if (!key) {
    showStatus("Введите ключ синхронизации.", "err");
    return;
  }
  if (!file) {
    showStatus("Выберите файл.", "err");
    return;
  }

  btn.disabled = true;
  showStatus("Читаю файл...", "loading");

  try {
    const data = await file.arrayBuffer();
    const workbook = XLSX.read(data, { type: "array" });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });

    const orders = rows.map((row) => ({
      order_number: String(row["Номер документа"] ?? "").trim(),
      equipment: String(row["Наименование товара"] ?? "").trim(),
      serial_number: String(row["Серийный номер"] ?? "").trim(),
      client_name: String(row["Заказчик"] ?? "").trim(),
      service_engineer: String(row["СИ"] ?? "").trim(),
      days_in_service: row["Кол-во дней в ремонте"] === "" ? null : Number(row["Кол-во дней в ремонте"]),
      comment: String(row["Комментарий"] ?? "").trim(),
      status: String(row["Статус"] ?? "").trim() || "Принято в сервис",
    })).filter((o) => o.order_number);

    if (orders.length === 0) {
      showStatus("В файле не найдено ни одной строки с номером заявки. Проверьте названия колонок.", "err");
      btn.disabled = false;
      return;
    }

    showStatus(`Найдено ${orders.length} заявок. Отправляю в базу...`, "loading");

    const resp = await fetch(FUNCTION_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-sync-key": key,
      },
      body: JSON.stringify({ orders }),
    });

    const result = await resp.json();

    if (!resp.ok) {
      showStatus("Ошибка: " + (result.error || resp.statusText), "err");
    } else {
      showStatus(`Готово! Обработано заявок: ${result.processed}.`, "ok");
    }
  } catch (e) {
    showStatus("Ошибка при обработке файла: " + e.message, "err");
  } finally {
    btn.disabled = false;
  }
});
</script>

</body>
</html>
